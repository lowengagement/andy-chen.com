<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Western Mass</title>
<style>
.gallery img { cursor: pointer; width: 30%; }
input[type="checkbox"] { display: none; }
.lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; }
.lightbox img { position: absolute; top: 0; left: 0; right: 0; bottom: 0; margin: auto; max-width: 80vw; max-height: 80vh; width: auto; height: auto; }
.close-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }
.gallery-item input:checked + .lightbox { display: block; }
</style>
</head>
<body>

<div class="gallery">
  <div class="gallery-item">
    <input type="checkbox" id="cb1">
    <label for="cb1"><img src="../assets/western-mass/bench-noho.jpg" alt=""></label>
    <div class="lightbox">
      <img src="../assets/western-mass/bench-noho.jpg" alt="">
      <label for="cb1" class="close-overlay"></label>
    </div>
  </div>

  <div class="gallery-item">
    <input type="checkbox" id="cb2">

      <img src="../assets/western-mass/ethan-shower-2.jpg" alt="">
      <label for="cb2" class="close-overlay"></label>
    </div>
  </div>

  <div class="gallery-item">
    <input type="checkbox" id="cb3">
    <label for="cb3"><img src="../assets/western-mass/graff-036.jpg" alt=""></label>

      <img src="../assets/western-mass/graff-036.jpg" alt="">

      <label for="cb4" class="close-overlay"></label>
    </div>
  </div>

  <div class="gallery-item">
    <input type="checkbox" id="cb5">
    <label for="cb5"><img src="../assets/western-mass/072.jpg" alt=""></label>
    <div class="lightbox">
      <img src="../assets/western-mass/072.jpg" alt="">
      <label for="cb5" class="close-overlay"></label>
    </div>
  </div>
</div>
