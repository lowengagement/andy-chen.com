<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recent</title>
<style>
.gallery img { 
  width: 35%; 
  cursor: pointer; 
}
input { 
  display: none; 
}
.lightbox { 
  display: none; 
  position: fixed; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%;
  background: rgba(0,0,0,0.8); 
  z-index: 9999; 
  justify-content: center; 
  align-items: center;
}
.lightbox label {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}
.lightbox img { 
  max-width: 80vw; 
  max-height: 80vh;
  position: relative;
  z-index: 1;
  display: block;
  margin: auto;
}
#cb1:checked ~ #lightbox1, 
#cb2:checked ~ #lightbox2, 
#cb3:checked ~ #lightbox3, 
#cb4:checked ~ #lightbox4, 
#cb5:checked ~ #lightbox5 { 
  display: flex; 
}
</style>
</head>
<body>

<input type="checkbox" id="cb1">
<input type="checkbox" id="cb2">
<input type="checkbox" id="cb3">
<input type="checkbox" id="cb4">
<input type="checkbox" id="cb5">

<p class="gallery">
  <label for="cb1"><img src="../photos/recent/0012.png" alt=""></label>
  <br>
  <label for="cb2"><img src="../photos/recent/0014.png" alt=""></label>
  <br>
  <label for="cb3"><img src="../photos/recent/0013.png" alt=""></label>
  <br>
  <label for="cb4"><img src="../photos/recent/0003.png" alt=""></label>
  <br>
  <label for="cb5"><img src="../photos/recent/0048.png" alt=""></label>
</p>

<div id="lightbox1" class="lightbox">
  <label for="cb1">
    <img src="../photos/recent/0012.png" alt="">
  </label>
</div>

<div id="lightbox2" class="lightbox">
  <label for="cb2">
    <img src="../photos/recent/0014.png" alt="">
  </label>
</div>

<div id="lightbox3" class="lightbox">
  <label for="cb3">
    <img src="../photos/recent/0013.png" alt="">
  </label>
</div>

<div id="lightbox4" class="lightbox">
  <label for="cb4">
    <img src="../photos/recent/0003.png" alt="">
  </label>
</div>

<div id="lightbox5" class="lightbox">
  <label for="cb5">
    <img src="../photos/recent/0048.png" alt="">
  </label>
</div>

<p>
  <a href="photo.html">Back</a>
</p>

</body>
</html>
